<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.15);
  --text: #1A1A18;
  --text-2: #6B6B65;
  --text-3: #A0A09A;
  --green: #2D7D5A;
  --green-l: #E8F5EE;
  --green-m: #5DB88A;
  --blue: #2563A8;
  --coral: #B84C2E;
  --r: 12px;
  --r-sm: 7px;
  --sh: 0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}

.shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh}

/* Sidebar */
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:28px 0;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
.sidebar-logo{padding:0 20px 22px;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--text-3);letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--border);margin-bottom:10px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text-2);font-size:14px;transition:all .15s;border-left:2px solid transparent;user-select:none}
.nav-item:hover{color:var(--text);background:var(--bg)}
.nav-item.active{color:var(--text);font-weight:500;border-left-color:var(--text);background:var(--bg)}
.nav-icon{width:17px;height:17px;opacity:.45;flex-shrink:0}
.nav-item.active .nav-icon{opacity:1}
.sidebar-footer{margin-top:auto;padding:16px 20px 0;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.sync-status{font-size:11px;font-family:'DM Mono',monospace;color:var(--text-3);display:flex;align-items:center;gap:6px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text-3);flex-shrink:0}
.sync-dot.ok{background:var(--green)}
.sync-dot.err{background:var(--coral)}
.sync-dot.syncing{background:#C47B1E;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.footer-btn{width:100%;padding:8px 12px;background:none;border:1px solid var(--border-strong);border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text-2);cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s}
.footer-btn:hover{background:var(--bg);color:var(--text)}

/* Main */
.main{padding:36px 40px;max-width:700px}
.page{display:none}.page.active{display:block}
.page-header{margin-bottom:26px}
.page-title{font-size:22px;font-weight:500;letter-spacing:-.02em;margin-bottom:3px}
.page-sub{font-size:12px;color:var(--text-3);font-family:'DM Mono',monospace}

/* Add bar */
.add-bar{display:flex;gap:8px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;box-shadow:var(--sh)}
.add-bar input{flex:1;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:transparent}
.add-bar input::placeholder{color:var(--text-3)}
.add-bar select{border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-2);background:transparent;cursor:pointer}
.add-bar button{padding:6px 14px;background:var(--text);color:#fff;border:none;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.add-bar button:hover{opacity:.8}

/* Summary */
.summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:14px;box-shadow:var(--sh);display:flex;align-items:center;gap:16px}
.sum-num{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;letter-spacing:-.02em}
.sum-label{font-size:12px;color:var(--text-3)}
.prog-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.sum-pct{font-family:'DM Mono',monospace;font-size:13px;color:var(--text-2)}

/* Habit cards */
.hcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px;margin-bottom:8px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px;transition:border-color .2s}
.hcard.complete{border-color:var(--green-m)}
.hcard-weekly{flex-direction:column;align-items:stretch}
.hcard-weekly .hrow{display:flex;align-items:center;gap:12px}

.chk{width:23px;height:23px;border-radius:50%;border:1.5px solid var(--border-strong);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.chk:hover{border-color:var(--green)}
.chk.done{background:var(--green);border-color:var(--green)}
.chk.done::after{content:'';display:block;width:7px;height:7px;border-radius:50%;background:#fff}

.hname{flex:1;font-size:14px;transition:color .2s}
.hname.done{text-decoration:line-through;color:var(--text-3)}
.streak{font-family:'DM Mono',monospace;font-size:11px;color:var(--green);background:var(--green-l);padding:2px 8px;border-radius:20px;white-space:nowrap}
.del{border:none;background:none;color:var(--text-3);cursor:pointer;font-size:17px;line-height:1;padding:2px 4px;opacity:0;transition:opacity .15s}
.hcard:hover .del{opacity:1}
.del:hover{color:var(--coral)}

/* Week dots */
.wdots{display:flex;gap:4px;margin-top:10px}
.wdot{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'DM Mono',monospace;color:var(--text-3);transition:all .15s}
.wdot:hover{border-color:var(--green-m)}
.wdot.done{background:var(--green);border-color:var(--green);color:#fff;font-size:11px}
.wdot.today{border-color:var(--blue);color:var(--blue)}
.wdot.today.done{border-color:var(--green);color:#fff}

/* Quarterly */
.q-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .2s;box-shadow:var(--sh)}
.qcard:hover{border-color:var(--green-m)}
.qcard.done{border-color:var(--green);background:var(--green-l)}
.qchk{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border-strong);margin-bottom:10px;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all .2s}
.qcard.done .qchk{background:var(--green);border-color:var(--green);color:#fff}
.qname{font-size:13px;line-height:1.4;color:var(--text)}
.qcard.done .qname{color:var(--text-2)}

/* Todos */
.cat-block{margin-bottom:24px}
.cat-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cat-pill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;font-family:'DM Mono',monospace;letter-spacing:.04em}
.cat-ct{font-size:11px;color:var(--text-3);font-family:'DM Mono',monospace}
.todo-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.todo-item{display:flex;align-items:flex-start;gap:11px;padding:11px 15px;border-bottom:1px solid var(--border);transition:background .1s}
.todo-item:last-child{border-bottom:none}
.todo-item:hover{background:var(--bg)}
.tchk{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border-strong);background:transparent;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .2s}
.tchk:hover{border-color:var(--green)}
.tchk.done{background:var(--green);border-color:var(--green);color:#fff}
.ttext{flex:1;font-size:14px;line-height:1.5}
.ttext.done{text-decoration:line-through;color:var(--text-3)}

/* Empty */
.empty{text-align:center;padding:30px;color:var(--text-3);font-size:13px;background:var(--surface);border:1px dashed var(--border-strong);border-radius:var(--r)}

/* Setup banner */
.setup-banner{background:#FDF3E3;border:1px solid rgba(196,123,30,.25);border-radius:var(--r);padding:14px 18px;margin-bottom:20px;font-size:13px;line-height:1.6;color:#5A3A08}
.setup-banner strong{font-weight:500}
.setup-banner code{font-family:'DM Mono',monospace;font-size:12px;background:rgba(196,123,30,.12);padding:1px 5px;border-radius:3px}

/* Mobile */
@media(max-width:680px){
  .shell{grid-template-columns:1fr}
  .sidebar{position:fixed;bottom:0;left:0;right:0;top:auto;height:auto;flex-direction:row;padding:10px 0 max(10px,env(safe-area-inset-bottom));border-right:none;border-top:1px solid var(--border);z-index:100}
  .sidebar-logo,.sidebar-footer{display:none}
  .nav-item{flex:1;flex-direction:column;gap:3px;padding:6px 4px;font-size:10px;border-left:none;border-top:2px solid transparent;justify-content:center;align-items:center;text-align:center}
  .nav-item.active{border-left:none;border-top-color:var(--text)}
  .nav-icon{width:20px;height:20px}
  .main{padding:20px 16px 88px}
  .q-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="sidebar-logo">Tracker</div>
    <div class="nav-item active" onclick="showPage('daily',this)">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="8"/><path d="M10 6v4l3 3"/></svg>Daily
    </div>
    <div class="nav-item" onclick="showPage('weekly',this)">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="14" height="13" rx="2"/><path d="M3 8h14M7 2v3M13 2v3"/></svg>Weekly
    </div>
    <div class="nav-item" onclick="showPage('quarterly',this)">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2l2.4 5 5.6.8-4 3.9.9 5.5L10 14.7l-4.9 2.5.9-5.5L2 7.8l5.6-.8z"/></svg>Quarterly
    </div>
    <div class="nav-item" onclick="showPage('todos',this)">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h12M4 10h8M4 14h10"/></svg>To-dos
    </div>
    <div class="sidebar-footer">
      <div class="sync-status">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">Not configured</span>
      </div>
      <button class="footer-btn" onclick="exportCSV()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8M5 7l3 3 3-3M3 12h10"/></svg>
        Export CSV
      </button>
      <button class="footer-btn" onclick="showConfig()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.3 3.3l1.4 1.4M11.3 11.3l1.4 1.4M3.3 12.7l1.4-1.4M11.3 4.7l1.4-1.4"/></svg>
        Configure sync
      </button>
    </div>
  </nav>

  <main class="main">

    <!-- DAILY -->
    <div id="page-daily" class="page active">
      <div class="page-header">
        <div class="page-title">Daily habits</div>
        <div class="page-sub" id="daily-sub"></div>
      </div>
      <div class="add-bar">
        <input type="text" id="daily-input" placeholder="Add a habit…" onkeydown="if(event.key==='Enter')addHabit('daily')">
        <button onclick="addHabit('daily')">Add</button>
      </div>
      <div id="daily-summary"></div>
      <div id="daily-list"></div>
    </div>

    <!-- WEEKLY -->
    <div id="page-weekly" class="page">
      <div class="page-header">
        <div class="page-title">Weekly habits</div>
        <div class="page-sub" id="weekly-sub"></div>
      </div>
      <div class="add-bar">
        <input type="text" id="weekly-input" placeholder="Add a habit…" onkeydown="if(event.key==='Enter')addHabit('weekly')">
        <select id="weekly-target">
          <option value="1">1×/wk</option>
          <option value="2">2×/wk</option>
          <option value="3" selected>3×/wk</option>
          <option value="4">4×/wk</option>
          <option value="5">5×/wk</option>
          <option value="7">7×/wk</option>
        </select>
        <button onclick="addHabit('weekly')">Add</button>
      </div>
      <div id="weekly-list"></div>
    </div>

    <!-- QUARTERLY -->
    <div id="page-quarterly" class="page">
      <div class="page-header">
        <div class="page-title">Quarterly goals</div>
        <div class="page-sub" id="quarterly-sub"></div>
      </div>
      <div class="add-bar">
        <input type="text" id="quarterly-input" placeholder="Add a goal…" onkeydown="if(event.key==='Enter')addHabit('quarterly')">
        <button onclick="addHabit('quarterly')">Add</button>
      </div>
      <div id="quarterly-summary"></div>
      <div id="quarterly-list"></div>
    </div>

    <!-- TODOS -->
    <div id="page-todos" class="page">
      <div class="page-header">
        <div class="page-title">To-dos</div>
        <div class="page-sub" id="todos-sub"></div>
      </div>
      <div class="add-bar">
        <input type="text" id="todo-input" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTodo()">
        <select id="todo-cat">
          <option value="Personal">Personal</option>
          <option value="Work">Work</option>
          <option value="Campaign">Campaign</option>
          <option value="Health">Health</option>
          <option value="Finance">Finance</option>
          <option value="Home">Home</option>
          <option value="Other">Other</option>
        </select>
        <button onclick="addTodo()">Add</button>
      </div>
      <div id="todo-list"></div>
    </div>

  </main>
</div>

<!-- Config modal -->
<div id="config-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--surface);border-radius:var(--r);padding:28px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.2)">
    <div style="font-size:16px;font-weight:500;margin-bottom:6px">Configure Google Sheets sync</div>
    <div style="font-size:13px;color:var(--text-2);margin-bottom:18px;line-height:1.6">Paste your Apps Script Web App URL below. See the setup guide for instructions.</div>
    <input type="text" id="script-url-input" placeholder="https://script.google.com/macros/s/…/exec"
      style="width:100%;padding:10px 12px;border:1px solid var(--border-strong);border-radius:var(--r-sm);font-family:'DM Mono',monospace;font-size:12px;color:var(--text);background:var(--bg);outline:none;margin-bottom:14px">
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button onclick="closeConfig()" style="padding:8px 16px;border:1px solid var(--border-strong);border-radius:var(--r-sm);background:none;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;color:var(--text-2)">Cancel</button>
      <button onclick="saveConfig()" style="padding:8px 16px;background:var(--text);color:#fff;border:none;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer">Save & sync</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const HARDCODED_URL = 'https://script.google.com/macros/s/AKfycbyH-m6T2RtxcLb_F5yXG_XgyQT_O0LIoIQaqC3NLUS7JQ8yFhlGT398zP31V_XVaYvv/exec';

// ── CONSTANTS ───────────────────────────────────────────────────────────────
const TODAY = new Date();
function localDateKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
const TODAY_KEY = localDateKey(TODAY);
const DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const CAT_STYLE = {
  Personal:{bg:'#F0EEFB',color:'#3C3489'},
  Work:{bg:'#EBF2FC',color:'#185FA5'},
  Campaign:{bg:'#FBF0EC',color:'#8C3418'},
  Health:{bg:'#E8F5EE',color:'#1E6040'},
  Finance:{bg:'#FDF3E3',color:'#7A4A0A'},
  Home:{bg:'#FBF0EC',color:'#8C3418'},
  Other:{bg:'#F4F3F0',color:'#4A4A44'}
};
const CAT_ORDER = ['Personal','Work','Campaign','Health','Finance','Home','Other'];

// ── DEFAULT DATA ─────────────────────────────────────────────────────────────
const DEFAULTS = {
  dailyHabits:[
    {id:'d1',name:'Flossed'},
    {id:'d2',name:'AM mobility (5–10 min)'},
    {id:'d3',name:'PM mobility / core'},
    {id:'d4',name:'Read 10–20 min'},
    {id:'d5',name:'Water before caffeine'},
    {id:'d6',name:'Phone out of bed'}
  ],
  weeklyHabits:[
    {id:'w1',name:'Long outdoor block (trail run / hike)',target:1},
    {id:'w2',name:'Swim session',target:1},
    {id:'w3',name:'Yoga / long mobility (~60 min)',target:1},
    {id:'w4',name:'Sheets',target:1},
    {id:'w5',name:'Nails',target:1}
  ],
  quarterlyHabits:[
    {id:'q1',name:'Registered for a race'},
    {id:'q2',name:'Big outdoor experience (e.g. camping)'},
    {id:'q3',name:'PT / massage / bodywork'},
    {id:'q4',name:'Wardrobe upgrade or tailoring'}
  ],
  todos:[
    {id:'t1',name:'Jury duty response',cat:'Personal',done:false,created:1},
    {id:'t2',name:'2351 backgrounder',cat:'Work',done:false,created:2},
    {id:'t3',name:'Update issues page',cat:'Campaign',done:false,created:3},
    {id:'t4',name:'Add 3–5 top issues to home page',cat:'Campaign',done:false,created:4},
    {id:'t5',name:'Update donate links (autofill amount + website reference)',cat:'Campaign',done:false,created:5},
    {id:'t6',name:'Update bio',cat:'Campaign',done:false,created:6},
    {id:'t7',name:'Add quick bio to homepage',cat:'Campaign',done:false,created:7}
  ],
  checks:{}
};

// ── STATE ────────────────────────────────────────────────────────────────────
let S = JSON.parse(JSON.stringify(DEFAULTS));
let scriptURL = '';
let syncTimer = null;

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

function weekStart(){
  const d=new Date(TODAY); d.setHours(0,0,0,0);
  d.setDate(d.getDate()-d.getDay()); return d;
}
function quarterKey(){
  return TODAY.getFullYear()+'-Q'+(Math.floor(TODAY.getMonth()/3)+1);
}
function quarterLabel(){
  const q=Math.floor(TODAY.getMonth()/3)+1;
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const s=[0,3,6,9],e=[2,5,8,11];
  return `Q${q} ${TODAY.getFullYear()} · ${mo[s[q-1]]}–${mo[e[q-1]]}`;
}

// ── SYNC ─────────────────────────────────────────────────────────────────────
function setSyncStatus(status, label){
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot' + (status ? ' '+status : '');
  lbl.textContent = label;
}

function getScriptURL(){
  return HARDCODED_URL || localStorage.getItem('tracker-script-url') || '';
}

// Load uses JSONP to sidestep CORS on GET
function loadFromSheets(){
  const url = getScriptURL();
  if (!url) { setSyncStatus('','Not configured'); return Promise.resolve(false); }
  setSyncStatus('syncing','Loading…');
  return new Promise((resolve) => {
    const cbName = '_trackerCb_' + Date.now();
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      cleanup(); setSyncStatus('err','Load timed out'); resolve(false);
    }, 10000);
    function cleanup(){ clearTimeout(timer); delete window[cbName]; if(script.parentNode) script.parentNode.removeChild(script); }
    window[cbName] = function(j){
      cleanup();
      if (j && j.ok) {
        if (j.data && Object.keys(j.data).length > 0){
          if (j.data.dailyHabits) S.dailyHabits = j.data.dailyHabits;
          if (j.data.weeklyHabits) S.weeklyHabits = j.data.weeklyHabits;
          if (j.data.quarterlyHabits) S.quarterlyHabits = j.data.quarterlyHabits;
          if (j.data.todos) S.todos = j.data.todos;
          if (j.data.checks) S.checks = j.data.checks;
          setSyncStatus('ok','Synced');
          resolve(true);
        } else {
          // First run — sheet is empty, push defaults
          saveToSheets().then(() => resolve(true));
        }
      } else {
        setSyncStatus('err','Load failed'); resolve(false);
      }
    };
    script.onerror = () => { cleanup(); setSyncStatus('err','Could not reach script'); resolve(false); };
    script.src = url + '?action=load&callback=' + cbName;
    document.head.appendChild(script);
  });
}

async function saveToSheets(){
  const url = getScriptURL();
  if (!url) return;
  setSyncStatus('syncing','Saving…');
  const state = {
    dailyHabits: S.dailyHabits,
    weeklyHabits: S.weeklyHabits,
    quarterlyHabits: S.quarterlyHabits,
    todos: S.todos,
    checks: S.checks
  };
  // Use no-cors POST — we can't read the response but the write still happens
  try {
    fetch(url + '?action=saveAll&state=' + encodeURIComponent(JSON.stringify(state)));
    setSyncStatus('ok','Saved · '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
  } catch(e){
    setSyncStatus('err','Save failed');
  }
}

function scheduleSave(){
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(saveToSheets, 1200);
}

// ── PERSISTENCE (localStorage fallback) ──────────────────────────────────────
function saveLocal(){
  try { localStorage.setItem('tracker-data', JSON.stringify(S)); } catch(e){}
}

function loadLocal(){
  try {
    const raw = localStorage.getItem('tracker-data');
    if (raw) S = JSON.parse(raw);
  } catch(e){}
}

function save(){
  saveLocal();
  scheduleSave();
}

// ── HABITS ───────────────────────────────────────────────────────────────────
function addHabit(type){
  const inp = document.getElementById(type+'-input');
  const name = inp.value.trim(); if(!name) return;
  const h = {id:uid(), name};
  if(type==='weekly') h.target = parseInt(document.getElementById('weekly-target').value);
  S[type+'Habits'].push(h); inp.value=''; save(); render();
}

function delHabit(type, id){
  S[type+'Habits'] = S[type+'Habits'].filter(h=>h.id!==id);
  delete S.checks[id]; save(); render();
}

function toggleCheck(id, key){
  if(!S.checks[id]) S.checks[id]={};
  S.checks[id][key] = !S.checks[id][key];
  save(); render();
}

function getStreak(id){
  const c = S.checks[id]||{};
  let d = new Date(TODAY), s = 0;
  for(let i=0;i<400;i++){
    const k = localDateKey(d);
    if(c[k]) s++; else if(k!==TODAY_KEY) break;
    d.setDate(d.getDate()-1);
  }
  return s;
}

// ── TODOS ─────────────────────────────────────────────────────────────────────
function addTodo(){
  const inp = document.getElementById('todo-input');
  const name = inp.value.trim(); if(!name) return;
  const cat = document.getElementById('todo-cat').value;
  S.todos.push({id:uid(),name,cat,done:false,created:Date.now()});
  inp.value=''; save(); render();
}

function toggleTodo(id){
  const t = S.todos.find(t=>t.id===id);
  if(t){ t.done=!t.done; save(); render(); }
}

function delTodo(id){
  S.todos = S.todos.filter(t=>t.id!==id);
  save(); render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){ renderDaily(); renderWeekly(); renderQuarterly(); renderTodos(); }

function renderDaily(){
  const habits = S.dailyHabits;
  document.getElementById('daily-sub').textContent =
    TODAY.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const doneN = habits.filter(h=>(S.checks[h.id]||{})[TODAY_KEY]).length;
  const pct = habits.length ? Math.round(doneN/habits.length*100) : 0;
  document.getElementById('daily-summary').innerHTML = habits.length ? `
    <div class="summary">
      <div><div class="sum-num">${doneN}<span style="color:var(--text-3);font-size:16px">/${habits.length}</span></div><div class="sum-label">today</div></div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="sum-pct">${pct}%</div>
    </div>` : '';
  document.getElementById('daily-list').innerHTML = habits.length
    ? habits.map(h=>{
        const done=!!(S.checks[h.id]||{})[TODAY_KEY];
        const streak=getStreak(h.id);
        return `<div class="hcard${done?' complete':''}">
          <div class="chk${done?' done':''}" onclick="toggleCheck('${h.id}','${TODAY_KEY}')"></div>
          <span class="hname${done?' done':''}">${h.name}</span>
          ${streak>1?`<span class="streak">${streak}d</span>`:''}
          <button class="del" onclick="delHabit('daily','${h.id}')">×</button>
        </div>`;
      }).join('')
    : '<div class="empty">No daily habits yet</div>';
}

function renderWeekly(){
  const habits = S.weeklyHabits;
  const ws = weekStart();
  document.getElementById('weekly-sub').textContent =
    'Week of '+ws.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  document.getElementById('weekly-list').innerHTML = habits.length
    ? habits.map(h=>{
        const target=h.target||1; let done=0;
        const dots=DAYS.map((l,i)=>{
          const dd=new Date(ws); dd.setDate(ws.getDate()+i);
          const dk=localDateKey(dd);
          const isDone=!!(S.checks[h.id]||{})[dk];
          const isToday=dk===TODAY_KEY;
          if(isDone)done++;
          return `<div class="wdot${isDone?' done':''}${isToday?' today':''}" onclick="toggleCheck('${h.id}','${dk}')" title="${dd.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}">${isDone?'✓':l}</div>`;
        }).join('');
        const pct=Math.min(100,Math.round(done/target*100));
        const complete=done>=target;
        return `<div class="hcard hcard-weekly${complete?' complete':''}">
          <div class="hrow">
            <span class="hname" style="${complete?'color:var(--green)':''}">${h.name}</span>
            <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-3)">${done}/${target}×</span>
            <button class="del" style="opacity:1" onclick="delHabit('weekly','${h.id}')">×</button>
          </div>
          <div class="prog-track" style="margin:8px 0 0"><div class="prog-fill" style="width:${pct}%"></div></div>
          <div class="wdots">${dots}</div>
        </div>`;
      }).join('')
    : '<div class="empty">No weekly habits yet</div>';
}

function renderQuarterly(){
  const habits = S.quarterlyHabits;
  const qk = quarterKey();
  document.getElementById('quarterly-sub').textContent = quarterLabel();
  const doneN = habits.filter(h=>(S.checks[h.id]||{})[qk]).length;
  const pct = habits.length ? Math.round(doneN/habits.length*100) : 0;
  document.getElementById('quarterly-summary').innerHTML = habits.length ? `
    <div class="summary">
      <div><div class="sum-num">${doneN}<span style="color:var(--text-3);font-size:16px">/${habits.length}</span></div><div class="sum-label">this quarter</div></div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="sum-pct">${pct}%</div>
    </div>` : '';
  document.getElementById('quarterly-list').innerHTML = habits.length
    ? `<div class="q-grid">${habits.map(h=>{
        const done=!!(S.checks[h.id]||{})[qk];
        return `<div class="qcard${done?' done':''}" onclick="toggleCheck('${h.id}','${qk}')">
          <div class="qchk">${done?'✓':''}</div>
          <div class="qname">${h.name}</div>
        </div>`;
      }).join('')}</div>`
    : '<div class="empty">No quarterly goals yet</div>';
}

function renderTodos(){
  const grouped={};
  for(const t of S.todos){ if(!grouped[t.cat]) grouped[t.cat]=[]; grouped[t.cat].push(t); }
  const active = CAT_ORDER.filter(c=>grouped[c]?.length);
  const total=S.todos.length, doneN=S.todos.filter(t=>t.done).length;
  document.getElementById('todos-sub').textContent = total ? `${doneN} of ${total} complete` : 'All clear';
  document.getElementById('todo-list').innerHTML = active.length
    ? active.map(cat=>{
        const items=grouped[cat];
        const cs=CAT_STYLE[cat]||CAT_STYLE.Other;
        const catDone=items.filter(t=>t.done).length;
        return `<div class="cat-block">
          <div class="cat-hdr">
            <span class="cat-pill" style="background:${cs.bg};color:${cs.color}">${cat}</span>
            <span class="cat-ct">${catDone}/${items.length}</span>
          </div>
          <div class="todo-card">${items.map(t=>`<div class="todo-item">
            <div class="tchk${t.done?' done':''}" onclick="toggleTodo('${t.id}')">${t.done?'✓':''}</div>
            <span class="ttext${t.done?' done':''}">${t.name}</span>
            <button class="del" style="opacity:0" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0" onclick="delTodo('${t.id}')">×</button>
          </div>`).join('')}</div>
        </div>`;
      }).join('')
    : '<div class="empty">No tasks yet — add one above</div>';
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportCSV(){
  const rows=[['type','id','name','date','value','category']];
  for(const h of S.dailyHabits){
    const c=S.checks[h.id]||{};
    for(const [date,val] of Object.entries(c)) if(val) rows.push(['daily',h.id,h.name,date,'1','']);
  }
  for(const h of S.weeklyHabits){
    const c=S.checks[h.id]||{};
    for(const [date,val] of Object.entries(c)) if(val) rows.push(['weekly',h.id,h.name,date,'1','']);
  }
  for(const h of S.quarterlyHabits){
    const c=S.checks[h.id]||{};
    for(const [date,val] of Object.entries(c)) if(val) rows.push(['quarterly',h.id,h.name,date,'1','']);
  }
  for(const t of S.todos) rows.push(['todo',t.id,t.name,localDateKey(new Date(t.created)),t.done?'done':'pending',t.cat]);
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`tracker-${TODAY_KEY}.csv`; a.click();
}

// ── CONFIG MODAL ──────────────────────────────────────────────────────────────
function showConfig(){
  const modal=document.getElementById('config-modal');
  modal.style.display='flex';
  const saved=localStorage.getItem('tracker-script-url')||HARDCODED_URL||'';
  document.getElementById('script-url-input').value=saved;
}
function closeConfig(){ document.getElementById('config-modal').style.display='none'; }
async function saveConfig(){
  const url=document.getElementById('script-url-input').value.trim();
  if(!url){ alert('Please enter a URL'); return; }
  localStorage.setItem('tracker-script-url',url);
  closeConfig();
  const ok=await loadFromSheets();
  if(ok) render();
  else setSyncStatus('err','Could not connect — check URL');
}
document.getElementById('config-modal').addEventListener('click',function(e){ if(e.target===this)closeConfig(); });

// ── NAV ───────────────────────────────────────────────────────────────────────
function showPage(page, el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  el.classList.add('active');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  loadLocal();
  render();
  const ok = await loadFromSheets();
  if(ok) render();
}

init();
</script>
